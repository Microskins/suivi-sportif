services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: suivi-sportif-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      API_PORT: 3001
      API_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${API_PUBLIC_BASE_URL:-https://suivi-sportif.fr}
    container_name: suivi-sportif-client
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: suivi-sportif-mcp
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MCP_API_BASE_URL: http://api:3001
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-suivi-sportif.fr,www.suivi-sportif.fr,localhost,127.0.0.1}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_ENABLE_MUTATIONS: ${MCP_ENABLE_MUTATIONS:-false}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3033
      NODE_ENV: production
    ports:
      - "127.0.0.1:3033:3033"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3033/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
