name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Server typecheck
        run: npm run typecheck -w server

      - name: Server tests
        run: npm run test -w server -- --run

      - name: Server build
        run: npm run build -w server

      - name: Client typecheck
        run: npm run typecheck -w client

      - name: Client build
        run: npm run build -w client

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod_deploy_key
          chmod 600 ~/.ssh/prod_deploy_key

      - name: Trust production host
        shell: bash
        run: |
          set -euo pipefail
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT || 22 }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/prod_deploy_key \
            -p "${{ secrets.PROD_SSH_PORT || 22 }}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "PROJECT_DIR='${{ vars.PROD_PROJECT_DIR || '/var/www/suivi-sportif' }}' BRANCH_NAME=main bash -s" \
            < scripts/deploy-production.sh
