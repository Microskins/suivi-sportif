name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  # GitHub will switch JavaScript actions from Node 20 to Node 24 by default on June 2, 2026.
  # Opt in early to catch incompatibilities sooner. The deprecation warning may still appear.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Server typecheck
        run: npm run typecheck -w server

      - name: Server tests
        run: npm run test -w server -- --run

      - name: Server build
        run: npm run build -w server

      - name: Client typecheck
        run: npm run typecheck -w client

      - name: Client build
        run: npm run build -w client

  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, ARM64, production]
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: suivi-sportif
          cleanup: false

      - name: Deploy locally
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ vars.PROD_PROJECT_DIR || '/var/www/suivi-sportif' }}" BRANCH_NAME=main bash scripts/deploy-production.sh
